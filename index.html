<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="pokeball-bg"></div>

    <header class="container">
        <a href="index.html" class="logo">
            <img src="https://raw.githubusercontent.com/PokeAPI/media/master/logo/pokeapi_256.png" alt="Pokédex" />
        </a>
        <div class="search-wrapper">
            <div class="form-group">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="icon-search">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
                </svg>
                <input type="search" id="search-input" placeholder="Buscar Pokémon..." autocomplete="off"/>
            </div>
            <button class="btn-search" id="btn-search">Buscar</button>
        </div>
    </header>

    <div class="container toolbar">
        <div class="icon-filter" id="btn-filter">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"/>
            </svg>
            <span>Filtrar por tipo</span>
        </div>
        <div class="results-count" id="results-count">Cargando Pokémon...</div>
    </div>

    <!-- Sidebar Filters -->
    <aside class="container-filters" id="container-filters">
        <div class="filter-header">
            <span>Tipos</span>
            <button class="btn-clear-filters" id="btn-clear-filters">Limpiar</button>
        </div>
        <div class="filter-by-type" id="filter-types">
            <!-- Generated by JS -->
        </div>
    </aside>
    <div class="overlay" id="overlay"></div>

    <main class="card-list-pokemon container" id="pokemon-list">
        <!-- Skeletons -->
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
    </main>

    <div class="load-more-wrapper">
        <button class="btn-load-more" id="btn-load-more" style="display:none;">
            Cargar más Pokémon
        </button>
    </div>

    <script src="main.js"></script>
</body>
</html>
