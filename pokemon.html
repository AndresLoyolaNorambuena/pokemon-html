<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="pokemon-page">

    <header class="container">
        <a href="index.html" class="logo">
            <img src="https://raw.githubusercontent.com/PokeAPI/media/master/logo/pokeapi_256.png" alt="Pokédex" />
        </a>
        <a href="index.html" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="20" height="20">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
            </svg>
            Volver al Pokédex
        </a>
    </header>

    <main class="container main-pokemon" id="pokemon-detail">
        <!-- Loading state -->
        <div class="detail-loading">
            <div class="skeleton-detail-img"></div>
            <div class="skeleton-detail-info">
                <div class="skeleton-line wide"></div>
                <div class="skeleton-line medium"></div>
                <div class="skeleton-line short"></div>
            </div>
        </div>
    </main>

    <!-- El traductor se carga primero, pokemon.js lo usa -->
    <script src="traductor.js"></script>
    <script src="pokemon.js"></script>
</body>
</html>
